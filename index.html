<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PingTask</title>
    <!-- Tailwind CSS for clean styling -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Leaflet Map CSS and JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif; }
        #map { height: 450px; width: 100%; border-radius: 8px; z-index: 1; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <!-- Top Navigation Bar -->
    <header class="bg-white border-b border-gray-200 px-6 py-4 flex items-center justify-between sticky top-0 z-50">
        <div class="flex items-center space-x-2 text-blue-600 font-bold text-xl">
            <span>📍</span>
            <span>Pings</span>
        </div>
        <span class="bg-blue-50 text-blue-700 text-xs font-semibold px-2.5 py-1 rounded-full border border-blue-200">2 in range</span>
    </header>

    <!-- Main Content Container -->
    <main class="max-w-7xl mx-auto p-4 space-y-4">
        
        <!-- Filter Controls Panel -->
        <section class="bg-white p-4 rounded-xl border border-gray-200 shadow-xs flex flex-col md:flex-row gap-4 items-end">
            <div class="w-full md:w-1/2">
                <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Zip Code</label>
                <input type="text" id="zipInput" value="11021" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-hidden focus:ring-2 focus:ring-blue-500">
            </div>
            <div class="w-full md:w-1/4">
                <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Distance</label>
                <select id="distanceSelect" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm bg-white focus:outline-hidden focus:ring-2 focus:ring-blue-500">
                    <option value="1">1 mile</option>
                    <option value="5">5 miles</option>
                    <option value="10">10 miles</option>
                </select>
            </div>
            <div class="flex gap-2 w-full md:w-auto justify-end">
                <button onclick="applyFilters()" class="bg-blue-600 hover:bg-blue-700 text-white font-medium text-sm px-5 py-2 rounded-lg transition-colors shadow-xs cursor-pointer">Apply</button>
                <button onclick="clearFilters()" class="border border-gray-300 hover:bg-gray-50 text-gray-700 font-medium text-sm px-5 py-2 rounded-lg transition-colors cursor-pointer">Clear</button>
            </div>
        </section>

        <!-- Live Interactive Map Component -->
        <section class="bg-white p-2 rounded-xl border border-gray-200 shadow-xs">
            <div id="map"></div>
        </section>

        <!-- Active Task Feed Listing -->
        <section class="space-y-3">
            <h2 class="text-sm font-bold text-gray-500 uppercase tracking-wider flex items-center gap-2 px-1">
                Active Pings <span class="bg-gray-200 text-gray-700 text-xs px-2 py-0.5 rounded-full" id="pingCount">2</span>
            </h2>
            
            <div id="pingList" class="space-y-3">
                <!-- Task items dynamically managed via Javascript below -->
            </div>
        </section>
    </main>

    <!-- App Functionality Logic -->
    <script>
        // Set up coordinates for initial demo view (Great Neck area)
        const centerLat = 40.7980;
        const centerLng = -73.7285;

        // Initialize the interactive map canvas
        const map = L.map('map').setView([centerLat, centerLng], 16);

        // Load map visual tile styling assets safely
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // Simulated local database for tasks
        const initialPings = [
            { id: 1, title: "Help move a couch", lat: 40.7985, lng: -73.7295, pay: 40 },
            { id: 2, title: "IKEA furniture assembly", lat: 40.7972, lng: -73.7270, pay: 25 }
        ];

        let activeMarkers = [];

        function renderPings(pings) {
            // Reset old map markers
            activeMarkers.forEach(m => map.removeLayer(m));
            activeMarkers = [];

            // Clear layout feed container list
            const listContainer = document.getElementById('pingList');
            listContainer.innerHTML = '';
            document.getElementById('pingCount').innerText = pings.length;

            pings.forEach(ping => {
                // Add pins onto the live map layer
                const marker = L.marker([ping.lat, ping.lng]).addTo(map)
                    .bindPopup(`<b>${ping.title}</b><br>Payout: $${ping.pay}`);
                activeMarkers.push(marker);

                // Add card template item directly into the active feed panel
                const card = document.createElement('div');
                card.className = "bg-white border border-gray-200 hover:border-blue-300 rounded-xl p-4 flex items-center justify-between shadow-xs transition-all cursor-pointer";
                card.onclick = () => map.setView([ping.lat, ping.lng], 18);
                card.innerHTML = `
                    <div class="flex items-start space-x-3">
                        <div class="bg-blue-50 text-blue-600 p-2 rounded-lg font-bold text-lg">📍</div>
                        <div>
                            <h3 class="font-semibold text-gray-900 text-base">${ping.title}</h3>
                            <p class="text-xs text-gray-400 mt-0.5">${ping.lat.toFixed(4)}, ${ping.lng.toFixed(4)}</p>
                        </div>
                    </div>
                    <div class="text-emerald-600 font-bold text-lg">$ ${ping.pay}</div>
                `;
                listContainer.appendChild(card);
            });
        }

        function applyFilters() {
            const zip = document.getElementById('zipInput').value;
            alert(`Filtering layout scan zone for zip code code parameters: ${zip}`);
        }

        function clearFilters() {
            document.getElementById('zipInput').value = '';
            renderPings(initialPings);
        }

        // Run component compilation on application mount
        renderPings(initialPings);
    </script>
</body>
</html>
